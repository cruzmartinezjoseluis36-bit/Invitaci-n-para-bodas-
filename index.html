<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación</title>
</head>
<body>
    <main class="principal"> 
        
        <h2 class="our-wedding">¡NOS CASAMOS!</h2>
        <h1 class="principal-title">Eduardo y Alejandra</h1>
        <p class="mensaje">Depués de mucho pensarlo (unos cinco segundos), decidimos casarnos. ¡Ven a celebrarlo con nostros!</p>


        <h2 class="principal-title">¡Que vivan los novios!</h2>
        <h2 class="date"> 02 de Octubre 2026</h2>
        <div class="counter">
            <div class="time-block">
                <span class="number" id="dias">00</span>
                <span class="etiqueta"></span>
            </div>
            <div class="time-block">
                <span class="number" id="horas">00</span>
                <span class="etiqueta"></span>
            </div>
            <div class="time-block">
                <span class="number" id="minutos">00</span>
                <span class="etiqueta"></span>                
            </div>
            <div class="time-block">
                <span class="number" id="segundos">00</span>
                <span class="etiqueta"></span>
            </div>
        </div>
        <div class="invitacion">
            <h4 class="guest"></h4>
            <h4 class="confirmacion">
                ¡Confirma tu asistencia!
            </h4>
        </div>
        <div class="ubicaciones">
            <div class="iglesia">
                <span class="icon"></span>
                <a href="" class="ubicacion"></a>
            </div>
            <div class="receptcion">
                <span class="icon"></span>
                <a href="" class="ubicacion"></a>
            </div>
        </div>
    </main>
</body>
</html>
